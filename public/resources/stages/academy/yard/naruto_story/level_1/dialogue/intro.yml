dialogue:
  - speaker: iruka_umino
    text: "Naruto, today you will learn the basics."
  - speaker: naruto_uzumaki
    text: "Heh, I already know **everything**! *Believe it!*"
  - speaker: iruka_umino
    text: "Then show me. Walk over there."
    wait: naruto_move_to_center_tile
  - speaker: iruka_umino
    text: "Well done. That is how you move across the field."
  - speaker: naruto_uzumaki
    text: "See? I told you I knew this already!"
  - speaker: iruka_umino
    text: "Then stay focused. The next lesson is harder."
  - speaker: iruka_umino
    text: "Walking is slow, but it keeps your noise down. When you do not want every ear on the field turning toward you, you walk."
  - speaker: iruka_umino
    text: "Look ahead, Naruto. See the line in front of you?"
  - speaker: iruka_umino
    text: "If you rush straight in, you will take the **quickest** route."
  - speaker: iruka_umino
    text: "That route is fast, but it is also the easiest one for somebody watching you to read."
  - speaker: iruka_umino
    text: "Roll the wheel and you can lean that line `left` or `right` without changing where you end up."
  - speaker: naruto_uzumaki
    text: "Same tile. **Different approach.**"
  - speaker: iruka_umino
    text: "Great. An arc takes longer, but it is less predictable, and it can keep you clear of something sitting in the direct lane."
  - speaker: iruka_umino
    text: "Now prove it. Take that tile again, but this time bring the line in from one side."
    wait: naruto_route_to_training_tile
  - speaker: iruka_umino
    text: "You see? Your destination is only half the decision. Your approach is the other half."
  - speaker: iruka_umino
    text: "Now take your swing wider."
  - speaker: naruto_uzumaki
    text: "Wider? You want me to circle out before I close in?"
  - speaker: iruka_umino
    text: "Press the wheel down once. That changes the line from a `short` bend to a `wide` one."
  - speaker: iruka_umino
    text: "The wider the bend, the less obvious your approach becomes, but the more time you spend getting there."
  - speaker: iruka_umino
    text: "Then roll it again if you need to choose which side opens up. Reach that far tile with a broad approach."
    wait: naruto_wide_route_to_far_tile
  - speaker: naruto_uzumaki
    text: "Heh. Fine. I'll take the long way around."
  - speaker: iruka_umino
    text: "Not the long way. The deliberate way."
  - speaker: iruka_umino
    text: "One more thing. If you **press and hold** instead of tapping, you break into a run."
  - speaker: naruto_uzumaki
    text: "So the path stays the same. I just cover it faster."
  - speaker: iruka_umino
    text: "That's it. Running is faster, but it is louder, rougher, and much easier to track."
  - speaker: iruka_umino
    text: "Go on, then. Hold on that tile and run it back."
    wait: naruto_run_back_to_training_tile
  - speaker: naruto_uzumaki
    text: "Now you're speaking my language."
  - speaker: iruka_umino
    text: "Speed is useful, but control matters more. `Right click`, and you can jump along the same route instead of running it."
  - speaker: naruto_uzumaki
    text: "So I just launch straight to the tile."
  - speaker: iruka_umino
    text: "A jump can carry you over terrain and obstacles, but once you leave the ground, you are committed. No stopping. No changing direction."
  - speaker: iruka_umino
    text: "Now you're getting it. Take that far tile again, and do it with a jump."
    wait: naruto_jump_to_far_tile
  - speaker: naruto_uzumaki
    text: "Hah. That's more like it."
  - speaker: iruka_umino
    text: "And if you **hold the right button** instead of flicking it, you can skip the route entirely and use *teleportation jutsu*."
  - speaker: naruto_uzumaki
    text: "Hold it down, and I just vanish to the tile?"
  - speaker: iruka_umino
    text: "Exactly. It is instant and difficult to predict, but it costs chakra, and if you lean on it too hard, you lose awareness of the field around you."
  - speaker: iruka_umino
    text: "Try it. Hold the right button and reappear on that training tile."
    wait: naruto_teleport_to_training_tile
  - speaker: naruto_uzumaki
    text: "Now that is efficient."
  - speaker: iruka_umino
    text: "All right. Enough footwork. We are going to do some *shurikenjutsu*."
  - speaker: naruto_uzumaki
    text: "Tch. I can handle target practice. You'll see."
  - speaker: iruka_umino
    text: "Hold on. Let me get out of your line first."
    wait: iruka_move_out_of_the_way
  - speaker: naruto_uzumaki
    text: "Hey, I'm not **that** sloppy."
  - speaker: iruka_umino
    text: "Then prove it. Take the throwing spot."
    wait: naruto_move_to_throw_position
  - speaker: iruka_umino
    text: "There you go, Naruto. Click the **shuriken** in your inventory."
  - speaker: iruka_umino
    text: "Then hover the post straight ahead. The red line will show you the throw."
  - speaker: iruka_umino
    text: "A straight throw is the fastest way to send steel forward, but it is also the easiest throw in the world to anticipate."
  - speaker: iruka_umino
    text: "When your aim is true, click the post and let it fly."
    wait: naruto_throw_shuriken_straight
  - speaker: naruto_uzumaki
    text: "See? I told you I could do it."
  - speaker: iruka_umino
    text: "Straight throws are the easy part. Now curve one in."
  - speaker: naruto_uzumaki
    text: "You want me to bend the throw the same way I bent my pathing?"
  - speaker: iruka_umino
    text: "Well done. A curved throw is harder to read, and it can slip around something in the lane, but you pay for it in speed."
  - speaker: iruka_umino
    text: "Show me. Keep the same target, but roll the wheel and bring the line in from one side."
  - speaker: iruka_umino
    text: "Use a **short arc** and hit the post to your right."
    wait: naruto_throw_shuriken_short_arc
  - speaker: naruto_uzumaki
    text: "Heh. Fine. I'll curve it in."
  - speaker: iruka_umino
    text: "Keep it up. Now open the throw wider."
  - speaker: naruto_uzumaki
    text: "So this time I switch the family and swing it out before it closes?"
  - speaker: iruka_umino
    text: "Right. Press the wheel down once to change from a `short` arc to a `wide` one."
  - speaker: iruka_umino
    text: "The wider the throw, the stranger it looks, but the slower it arrives, and the less accurate it becomes."
  - speaker: iruka_umino
    text: "Then roll again to choose the side and hit the last post."
    wait: naruto_throw_shuriken_wide_arc
  - speaker: naruto_uzumaki
    text: "All right. Let's see you complain about *that* one."
  - speaker: iruka_umino
    text: "Great job. Now we stop drilling one throw at a time."
  - speaker: iruka_umino
    text: "I am giving you a timed challenge. I will call a tile. Move to it. Only when you reach it will a post light up for your next throw."
  - speaker: naruto_uzumaki
    text: "So I move first, then throw. Seven shuriken. No excuses."
  - speaker: iruka_umino
    text: "Listen carefully. You have `30 seconds`. Watch the count, keep your hands moving, and do not waste a throw."
  - speaker: naruto_uzumaki
    text: "Hah. Then quit talking and start the clock."
  - speaker: iruka_umino
    text: "Fine. Show me you can keep up once the choices start changing."
    wait: naruto_shuriken_challenge
  - speaker: iruka_umino
    text: "Better. That is what it looks like when you stop flailing and start thinking."
  - speaker: naruto_uzumaki
    text: "Yeah, yeah. I still made it."
  - speaker: iruka_umino
    text: "All right. Now open the jutsu panel. That is where your techniques are stored."
  - speaker: iruka_umino
    text: "And the bar above your inventory is your action chain. When you select a jutsu, it goes there first. It does not resolve on its own."
  - speaker: naruto_uzumaki
    text: "So I stack the techniques I want before I use them."
  - speaker: iruka_umino
    text: "Now pay attention. First, put **Infuse Chakra** into your action chain."
    wait: naruto_queue_infuse_chakra_jutsu
  - speaker: iruka_umino
    text: "That's more like it. Now queue *Clone Jutsu* after it."
  - speaker: naruto_uzumaki
    text: "Tch. That stupid jutsu? It never comes out right."
  - speaker: iruka_umino
    text: "Then stop sulking and set it properly. Put **Clone Jutsu** into your action chain."
    wait: naruto_queue_clone_jutsu
  - speaker: naruto_uzumaki
    text: "Fine. I'll queue it. Then you'll see it isn't the jutsu that's stupid."
  - speaker: iruka_umino
    text: "Then stop talking and commit. When your chain is set, click the **checkmark** to execute it."
    wait: naruto_execute_clone_chain
  - speaker: iruka_umino
    text: "That is enough embarrassment for one afternoon. Next is *Substitution Jutsu*."
  - speaker: iruka_umino
    text: "Start the same way. Queue **Infuse Chakra** again."
    wait: naruto_queue_infuse_chakra_for_substitution
  - speaker: naruto_uzumaki
    text: "Hold on. You're going to throw a shuriken at **me** for this one, aren't you?"
  - speaker: iruka_umino
    text: "Yes. Queue **Substitution Jutsu**, then pick the tile where you want to reappear. That destination becomes part of the chain too."
    wait: naruto_queue_substitution_destination
  - speaker: naruto_uzumaki
    text: "You say that like it makes the shuriken part any less awful."
  - speaker: iruka_umino
    text: "When the chain is ready, click the **checkmark**. I will throw. If you are serious, you will be gone before it reaches you."
    wait: naruto_execute_substitution_chain
  - speaker: naruto_uzumaki
    text: "That was way too close! You really threw it like you meant it, Iruka-sensei!"
  - speaker: iruka_umino
    text: "Do not be dramatic. If I had meant to hit you, we would be having a different conversation."
  - speaker: naruto_uzumaki
    text: "Tch. Easy for you to say when the shuriken isn't flying at your face."
  - speaker: iruka_umino
    text: "Now for *Transformation Jutsu*. If you cannot even manage a basic transformation, you will embarrass yourself before you ever embarrass an enemy."
  - speaker: iruka_umino
    text: "Queue **Infuse Chakra** first."
    wait: naruto_queue_infuse_chakra_for_transformation
  - speaker: naruto_uzumaki
    text: "Yeah, yeah. I know the order already."
  - speaker: iruka_umino
    text: "Then queue **Transformation Jutsu** after it."
    wait: naruto_queue_transformation_jutsu
  - speaker: naruto_uzumaki
    text: "Fine. Watch this."
  - speaker: iruka_umino
    text: "If your chain is set, click the **checkmark** and transform."
    wait: naruto_execute_transformation_chain
  - speaker: naruto_uzumaki
    text: "Wh- What? Why didn't it change?!"
  - speaker: iruka_umino
    text: "Because you are still slacking off. If you keep this up, Naruto, you will never be a ninja."
